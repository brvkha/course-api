spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course_demo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

application:
  security:
    jwt:
      # Bạn có thể dùng tool online sinh ra một mã Hex 256-bit bất kỳ
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 3600000 # Thời gian sống của Access Token (Ví dụ: 1 giờ = 3.600.000 ms)
      refresh-token:
        expiration: 604800000 # Thời gian sống của Refresh Token (Ví dụ: 7 ngày = 604.800.000 ms)

# Custom config cho AWS Local
aws:
  dynamodb:
    endpoint: http://localhost:8000
    region: ap-southeast-1